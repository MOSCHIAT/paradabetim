<svg class="w-full h-full max-h-[460px]" viewBox="0 0 500 850" fill="none" xmlns="http://www.w3.org/2000/svg" id="map-svg">
              <defs>
                <!-- Gradiente Arco-Íris que segue o trajeto principal do Orgulho de forma elegante -->
                <linearGradient id="rainbow-route" x1="400" y1="50" x2="100" y2="800" gradientUnits="userSpaceOnUse">
                  <stop offset="0%" stop-color="#E40303"/>    <!-- Vermelho -->
                  <stop offset="20%" stop-color="#FF8C00"/>   <!-- Laranja -->
                  <stop offset="40%" stop-color="#FFED00"/>   <!-- Amarelo -->
                  <stop offset="60%" stop-color="#008026"/>   <!-- Verde -->
                  <stop offset="80%" stop-color="#004CFF"/>   <!-- Azul -->
                  <stop offset="100%" stop-color="#732982"/>  <!-- Roxo -->
                </linearGradient>

                <!-- Filtros de Brilho Neon Profissional -->
                <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
                  <feGaussianBlur stdDeviation="12" result="blur"/>
                  <feMerge>
                    <feMergeNode in="blur"/>
                    <feMergeNode in="SourceGraphic"/>
                  </feMerge>
                </filter>
                <filter id="neon-glow-subtle" x="-10%" y="-10%" width="120%" height="120%">
                  <feGaussianBlur stdDeviation="5" result="blur"/>
                  <feMerge>
                    <feMergeNode in="blur"/>
                    <feMergeNode in="SourceGraphic"/>
                  </feMerge>
                </filter>
              </defs>

              <!-- TRÁFEGO DO TRAJETO (Preservando 100% da geometria S e Hairpin Loop do original) -->
              <!-- Desenho do Trajeto: Linha com sombra, linha base larga branca de fundo para dar contraste e linha arco-íris sobreposta -->
              <g id="route-group">
                <!-- Sombra suave por trás para dar profundidade de mapa -->
                <path d="M 275,275 L 360,75 C 367,55 395,65 390,90 L 320,290 C 285,390 235,460 180,530 C 130,595 105,650 115,705 C 125,750 155,770 180,770" stroke="#000" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.25"/>

                <!-- Glow Neon ajustável -->
                <path id="route-glow" d="M 275,275 L 360,75 C 367,55 395,65 390,90 L 320,290 C 285,390 235,460 180,530 C 130,595 105,650 115,705 C 125,750 155,770 180,770" stroke="url(#rainbow-route)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.6" filter="url(#neon-glow)"/>

                <!-- Linha Colorida Principal -->
                <path id="main-route-line" d="M 275,275 L 360,75 C 367,55 395,65 390,90 L 320,290 C 285,390 235,460 180,530 C 130,595 105,650 115,705 C 125,750 155,770 180,770" stroke="url(#rainbow-route)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

                <!-- Linha Central Pontilhada Branca (Estilo estrada chique e profissional) -->
                <path d="M 275,275 L 360,75 C 367,55 395,65 390,90 L 320,290 C 285,390 235,460 180,530 C 130,595 105,650 115,705 C 125,750 155,770 180,770" stroke="#FFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="10, 14" opacity="0.8"/>
              </g>

              <!-- SIMULAÇÃO DO TRIO ELÉTRICO ANIMADO AO LONGO DO CAMINHO -->
              <g id="animated-trio">
                <!-- Ícone elegante de Trio Elétrico com bandeira de Orgulho -->
                <path id="animation-path" d="M 275,275 L 360,75 C 367,55 395,65 390,90 L 320,290 C 285,390 235,460 180,530 C 130,595 105,650 115,705 C 125,750 155,770 180,770" fill="none"/>
                
                <!-- Trio Elétrico em Miniatura -->
                <g id="truck-group">
                  <animateMotion dur="14s" repeatCount="indefinite" rotate="auto">
                    <mpath href="#animation-path"/>
                  </animateMotion>
                  <!-- Sombra do Trio -->
                  <rect x="-14" y="-7" width="28" height="14" rx="3" fill="#000" opacity="0.3"/>
                  <!-- Corpo Principal do Trio -->
                  <rect x="-12" y="-6" width="24" height="12" rx="2" fill="#E40303" id="trio-body"/>
                  <rect x="-2" y="-5" width="13" height="10" rx="1" fill="#FFED00"/>
                  <!-- Cabine -->
                  <rect x="8" y="-4" width="5" height="8" rx="1" fill="#1E293B"/>
                  <!-- Alto-falantes no topo -->
                  <circle cx="-6" cy="-2" r="2.5" fill="#111827"/>
                  <circle cx="-6" cy="2" r="2.5" fill="#111827"/>
                  <circle cx="2" cy="-2" r="2.5" fill="#111827"/>
                  <circle cx="2" cy="2" r="2.5" fill="#111827"/>
                  <!-- Pequena bandeira do orgulho ondulando -->
                  <path d="M -8,0 L -14,-4 L -11,-1 L -14,2 Z" fill="#732982"/>
                  <!-- Brilho ao redor -->
                  <circle cx="0" cy="0" r="15" stroke="#FFF" stroke-width="1.5" opacity="0.4" class="animate-ping" style="animation-duration: 2s;"/>
                </g>
              </g>

              <!-- MARCADORES (PINS) E CRISTAIS DE INFORMAÇÃO -->
              <!-- Marcador 1: Poliesportivo (Concentração) -->
              <g transform="translate(245, 265)" class="cursor-pointer transition-all hover:scale-110" id="pin-poliesportivo">
                <g filter="url(#neon-glow-subtle)">
                  <!-- Pin Moderno Vetorial com Degradê Rosa/Vermelho -->
                  <path d="M 0,0 C -12,-12 -16,-24 -16,-34 C -16,-45 -7,-52 4,-52 C 15,-52 24,-45 24,-34 C 24,-24 20,-12 8,0 L 4,4 Z" fill="url(#pin-grad-red)"/>
                  <!-- Círculo Interno com ícone sutil de Megafone/Música -->
                  <circle cx="4" cy="-34" r="10" fill="#FFF"/>
                  <path d="M 1,-37 L 7,-37 L 9,-34 L 9,-32 L 7,-29 L 1,-29 Z" fill="#E40303"/>
                  <circle cx="2" cy="-31" r="1.5" fill="#E40303"/>
                </g>
                <!-- Anel pulsante decorativo de base -->
                <ellipse cx="4" cy="2" rx="8" ry="3" fill="#000" opacity="0.3"/>
              </g>

              <!-- Marcador 2: Praça do Encontro (Show) -->
              <g transform="translate(190, 755)" class="cursor-pointer transition-all hover:scale-110" id="pin-encontro">
                <g filter="url(#neon-glow-subtle)">
                  <!-- Pin Moderno Vetorial com Degradê Roxo/Azul -->
                  <path d="M 0,-5 C -12,-17 -16,-29 -16,-39 C -16,-50 -7,-57 4,-57 C 15,-57 24,-50 24,-39 C 24,-29 20,-17 8,-5 L 4,-1 Z" fill="url(#pin-grad-purple)"/>
                  <!-- Círculo Interno com ícone sutil de Estrela/Festa -->
                  <circle cx="4" cy="-39" r="10" fill="#FFF"/>
                  <path d="M 4,-45 L 6,-41 L 10,-40 L 7,-37 L 8,-33 L 4,-35 L 0,-33 L 1,-37 L -2,-40 L 2,-41 Z" fill="#732982"/>
                </g>
                <!-- Anel pulsante decorativo de base -->
                <ellipse cx="4" cy="-1" rx="8" ry="3" fill="#000" opacity="0.3"/>
              </g>

              <!-- Caixas de Texto com Labels sofisticadas no Mapa -->
              <!-- Label Poliesportivo -->
              <foreignObject x="20" y="240" width="190" height="75" id="label-poliesportivo-container">
                <div xmlns="http://www.w3.org/1999/xhtml" class="bg-slate-900/90 backdrop-blur-md border border-pink-500/30 p-2.5 rounded-xl shadow-lg transition-all-300">
                  <p class="text-[10px] font-bold tracking-wider text-pink-400 uppercase flex items-center gap-1">
                    <span class="w-1.5 h-1.5 rounded-full bg-pink-500"></span> Concentração
                  </p>
                  <p class="text-xs font-bold text-white leading-tight mt-0.5" id="label-poliesportivo-name">Poliesportivo</p>
                  <p class="text-[9px] text-slate-400 mt-0.5">Início do desfile, trios e ativações</p>
                </div>
              </foreignObject>

              <!-- Label Praça do Encontro -->
              <foreignObject x="210" y="730" width="220" height="75" id="label-encontro-container">
                <div xmlns="http://www.w3.org/1999/xhtml" class="bg-slate-900/90 backdrop-blur-md border border-purple-500/30 p-2.5 rounded-xl shadow-lg transition-all-300">
                  <p class="text-[10px] font-bold tracking-wider text-purple-400 uppercase flex items-center gap-1">
                    <span class="w-1.5 h-1.5 rounded-full bg-purple-400"></span> Dispersão &amp; Show
                  </p>
                  <p class="text-xs font-bold text-white leading-tight mt-0.5" id="label-encontro-name">Praça do Encontro</p>
                  <p class="text-[9px] text-slate-400 mt-0.5">Palco principal e encerramento</p>
                </div>
              </foreignObject>

              <!-- Indicador de Sentido do Fluxo no Mapa (Seta sutil) -->
              <g transform="translate(355, 200) rotate(-65)" opacity="0.7">
                <path d="M 0,0 L 10,-5 L 10,-2 L 25,-2 L 25,2 L 10,2 L 10,5 Z" fill="#FFF"/>
              </g>
              <g transform="translate(145, 620) rotate(120)" opacity="0.7">
                <path d="M 0,0 L 10,-5 L 10,-2 L 25,-2 L 25,2 L 10,2 L 10,5 Z" fill="#FFF"/>
              </g>

              <!-- Definição de Gradientes dos Pins -->
              <defs>
                <linearGradient id="pin-grad-red" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#FF5252"/>
                  <stop offset="100%" stop-color="#C62828"/>
                </linearGradient>
                <linearGradient id="pin-grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#E040FB"/>
                  <stop offset="100%" stop-color="#6A1B9A"/>
                </linearGradient>
              </defs>
            </svg>